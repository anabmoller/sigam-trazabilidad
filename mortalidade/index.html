<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A1628">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230A1628'/%3E%3Ctext x='16' y='22' font-family='Arial,Helvetica,sans-serif' font-size='14' font-weight='700' fill='%23F5B301' text-anchor='middle'%3EAM%3C/text%3E%3C/svg%3E">
<title>Mortalidad — SIGAM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600&display=swap');
  :root {
    --navy: #0A1628;
    --mustard: #F5B301;
    --green: #1a6b3c;
    --surface: #f5f4f1;
    --border: rgba(10,22,40,0.12);
    --card: #fff;
    --danger: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--surface);
    color: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* TOPBAR */
  .topbar {
    background: var(--navy);
    height: 52px;
    display: flex;
    align-items: center;
    padding: 0 1.25rem;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    padding-top: env(safe-area-inset-top, 0px);
  }
  .logo-mark {
    width: 28px; height: 28px;
    border: 1.5px solid var(--mustard);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .app-name { font-family: 'DM Serif Display', serif; color: #fff; font-size: 16px; }
  .app-name span { color: var(--mustard); }
  .topbar-sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-left: auto; }

  /* MAIN */
  .main { flex: 1; padding: 1.25rem; max-width: 600px; width: 100%; margin: 0 auto; padding-bottom: calc(90px + env(safe-area-inset-bottom, 0px)); }

  /* SECTION LABEL */
  .section-label {
    font-size: 10px; font-weight: 600; letter-spacing: .1em;
    text-transform: uppercase; color: #8a95a3;
    margin: 1.25rem 0 .6rem;
  }
  .section-label:first-child { margin-top: 0; }

  /* FIELD */
  .field { margin-bottom: .9rem; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #5a6778; margin-bottom: 4px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: .55rem .75rem;
    border: 1px solid var(--border);
    border-radius: 8px; font-family: 'Outfit', sans-serif;
    font-size: 14px; background: var(--card);
    color: var(--navy); outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--green); box-shadow: 0 0 0 3px rgba(26,107,60,.1);
  }
  .field textarea { resize: vertical; min-height: 72px; }
  .field input[readonly] { background: #f0f0ee; color: #6a7788; }

  /* ROW */
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }

  /* ID TABS */
  .id-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: .9rem; }
  .id-tab {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .15s; color: #5a6778;
    user-select: none;
  }
  .id-tab.active {
    background: var(--green); color: #fff; border-color: var(--green);
  }
  .id-panel { display: none; }
  .id-panel.active { display: block; }

  /* SEARCH INPUT (ID preload) */
  .id-search-wrap { position: relative; }
  .id-search-wrap input { padding-right: 2.5rem; }
  .id-clear {
    position: absolute; right: .6rem; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: #8a95a3; font-size: 16px;
    cursor: pointer; padding: 0 2px; line-height: 1;
  }
  .id-suggestions {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; z-index: 50; max-height: 200px; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(10,22,40,.12);
    display: none;
  }
  .id-suggestions.open { display: block; }
  .id-suggestion-item {
    padding: .55rem .75rem; font-size: 13px; cursor: pointer;
    border-bottom: 1px solid var(--border);
  }
  .id-suggestion-item:last-child { border-bottom: none; }
  .id-suggestion-item:hover { background: var(--surface); }
  .id-suggestion-item .id-num { font-weight: 600; color: var(--navy); }
  .id-suggestion-item .id-meta { font-size: 11px; color: #8a95a3; margin-left: 6px; }

  /* GPS */
  .gps-row { display: flex; gap: .5rem; align-items: center; }
  .gps-row input { flex: 1; min-width: 0; }
  .btn-gps {
    padding: .5rem .85rem; border-radius: 8px;
    background: var(--navy); color: #fff; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer;
    white-space: nowrap; transition: opacity .15s;
    font-family: 'Outfit', sans-serif; flex-shrink: 0;
  }
  .btn-gps:disabled { opacity: .5; cursor: default; }

  /* PHOTOS */
  .photo-slots { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
  .photo-slot label { display: block; font-size: 12px; font-weight: 600; color: #5a6778; margin-bottom: 4px; }
  .photo-slot-inner {
    cursor: pointer;
    border: 1.5px dashed var(--border);
    border-radius: 10px; background: var(--card);
    aspect-ratio: 1; position: relative;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px; cursor: pointer; overflow: hidden;
    transition: border-color .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .photo-slot-inner:active { border-color: var(--green); }
  .photo-slot-inner .slot-icon { font-size: 26px; color: #b0bec5; pointer-events: none; }
  .photo-slot-inner .slot-text { font-size: 10px; color: #8a95a3; pointer-events: none; text-align: center; padding: 0 8px; }
  .photo-slot-inner img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; border-radius: 9px; display: none;
  }
  .photo-slot-inner.has-photo img { display: block; }
  .photo-slot-inner .remove-photo {
    position: absolute; top: 4px; right: 4px;
    background: rgba(0,0,0,.55); color: #fff;
    border: none; border-radius: 50%; width: 24px; height: 24px;
    font-size: 13px; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    z-index: 2;
  }
  .photo-slot-inner.has-photo .remove-photo { display: flex; }
  .photo-slot-inner.has-photo .slot-icon,
  .photo-slot-inner.has-photo .slot-text { display: none; }
  /* hidden file inputs */
  .photo-file-input {
    position: absolute; top: 0; left: 0;
    width: 1px; height: 1px;
    opacity: 0; overflow: hidden;
    pointer-events: none;
  }

  /* CAUSA ESPECIFICAR */
  #causa-otra-wrap { display: none; margin-top: 8px; }
  #causa-otra-wrap.visible { display: block; }

  /* STATUS MESSAGE */
  .status-msg {
    border-radius: 8px; padding: .65rem .9rem;
    font-size: 13px; font-weight: 500; margin-top: .5rem;
    display: none;
  }
  .status-msg.error { background: #fdecea; color: var(--danger); display: block; }
  .status-msg.success { background: #e8f5e9; color: var(--green); display: block; }
  .status-msg.info { background: #e3f2fd; color: #1565c0; display: block; }

  /* SUBMIT BAR */
  .submit-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: .85rem 1.25rem;
    padding-bottom: calc(.85rem + env(safe-area-inset-bottom, 0px));
    z-index: 99;
  }
  .btn-submit {
    width: 100%; padding: .85rem;
    background: var(--green); color: #fff;
    border: none; border-radius: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  .btn-submit:disabled { opacity: .5; cursor: default; }
  .btn-submit:not(:disabled):hover { opacity: .9; }

  /* SPINNER */
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin .7s linear infinite; vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 400px) {
    .row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-mark">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <text x="9" y="13" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="700" fill="#F5B301" text-anchor="middle">AM</text>
    </svg>
  </div>
  <span class="app-name">SIG<span>AM</span></span>
  <span class="topbar-sub">Mortalidad</span>
</div>

<div class="main">

  <!-- ESTABLECIMIENTO + FECHA -->
  <div class="section-label">Establecimiento y fecha</div>

  <div class="field">
    <label for="estab">Establecimiento *</label>
    <select id="estab">
        <option value="">Seleccionar...</option>
        <option>Ypoti</option>
        <option>Ypoti 2</option>
        <option>Cerro Memby</option>
        <option>Santa Clara</option>
        <option>Lusipar</option>
        <option>Santa Maria da Serra</option>
        <option>Cielo Azul</option>
      </select>
  </div>

  <div class="row">
    <div class="field">
      <label for="fecha">Fecha *</label>
      <input type="date" id="fecha">
    </div>
    <div class="field">
      <label for="hora">Hora</label>
      <input type="time" id="hora">
    </div>
  </div>

  <!-- IDENTIFICACION -->
  <div class="section-label">Identificación del animal</div>

  <div class="id-tabs">
    <button type="button" class="id-tab active" data-tab="manual">N° manejo</button>
    <button type="button" class="id-tab" data-tab="rfid">RFID / EID</button>
    <button type="button" class="id-tab" data-tab="foto">Foto botón</button>
    <button type="button" class="id-tab" data-tab="sinid">Sin ID</button>
  </div>

  <!-- N° manejo (manual con preload desde Supabase) -->
  <div class="id-panel active" id="panel-manual">
    <div class="field">
      <label for="num-manejo">N° de manejo *</label>
      <div class="id-search-wrap">
        <input type="text" id="num-manejo" placeholder="Ingresar nԙ�ero..." inputmode="numeric" autocomplete="off">
        <button class="id-clear" id="num-manejo-clear" type="button" style="display:none">✕</button>
        <div class="id-suggestions" id="id-suggestions"></div>
      </div>
      <div id="id-selected-info" style="margin-top:6px;font-size:12px;color:#1a6b3c;display:none;"></div>
    </div>
  </div>

  <!-- RFID / EID -->
  <div class="id-panel" id="panel-rfid">
    <div class="field">
      <label for="caravana-rfid">EID (código RFID) *</label>
      <div style="display:flex;gap:.5rem;align-items:flex-start;">
        <input type="text" id="caravana-rfid" placeholder="Escanear o ingresar EID..." style="flex:1">
        <button class="btn-gps" id="btn-rfid-scan" style="flex-shrink:0">📡 Escanear</button>
      </div>
      <div id="rfid-status" style="margin-top:6px;font-size:12px;color:#8a95a3;"></div>
    </div>
  </div>

  <!-- Foto botón -->
  <div class="id-panel" id="panel-foto">
    <div class="field">
      <label>Foto del botón / caravana</label>
      <div class="photo-slot-inner" id="slot-boton" style="max-width:180px;aspect-ratio:1;">
        <div class="slot-icon">📷</div>
        <div class="slot-text">Tocar para fotografiar</div>
        <img id="preview-boton" src="" alt="">
        <button class="remove-photo" id="rm-boton" type="button">✕</button>
      </div>
      <input class="photo-file-input" type="file" accept="image/*" capture="environment" id="file-boton">
    </div>
    <div class="field">
      <label for="caravana-foto">N° leído en foto (opcional)</label>
      <input type="text" id="caravana-foto" placeholder="Si puede leerlo..." inputmode="numeric">
    </div>
  </div>

  <!-- Sin ID -->
  <div class="id-panel" id="panel-sinid">
    <div class="field">
      <label for="sinid-desc">Descripción del animal *</label>
      <input type="text" id="sinid-desc" placeholder="Ej: vaca blanca, pasto E3" autocomplete="off">
    </div>
  </div>

  <!-- CATEGORIA -->
  <div class="section-label">Categoría</div>

  <div class="row">
    <div class="field">
      <label for="categoria">Categoría *</label>
      <select id="categoria">
        <option value="">Seleccionar...</option>
        <option>Ternero/a</option>
        <option>Novillo</option>
        <option>Vaquillona</option>
        <option>Vaca</option>
        <option>Toro</option>
        <option>Buey</option>
        <option>Otro</option>
      </select>
    </div>
    <div class="field">
      <label for="sexo">Sexo</label>
      <select id="sexo">
        <option value="">—</option>
        <option>Macho</option>
        <option>Hembra</option>
      </select>
    </div>
  </div>

  <!-- CAUSA DE MUERTE -->
  <div class="section-label">Causa de muerte</div>

  <div class="field">
    <label for="causa">Causa *</label>
    <select id="causa">
      <option value="">Seleccionar...</option>

      <optgroup label="Enfermedades infecciosas">
        <option>Clostridiosis (carbunclo / edema maligno)</option>
        <option>Enterotoxemia clostridial</option>
        <option>Brucelosis</option>
        <option>Leptospirosis</option>
        <option>Rabia bovina (derriengue)</option>
        <option>Fiebre aftosa</option>
        <option>Septicemia / infección bacteriana</option>
      </optgroup>

      <optgroup label="Hemoparásitos">
        <option>Babesiosis (tristeza bovina)</option>
        <option>Anaplasmosis</option>
        <option>Tripanosomiasis (mal de caderas)</option>
        <option>Hemoparásito no identificado</option>
      </optgroup>

      <optgroup label="Enfermedades respiratorias">
        <option>Neumonía / bronconeumonía</option>
        <option>IBR (rinotraqueítis infecciosa bovina)</option>
        <option>Pleuroneumonía</option>
      </optgroup>

      <optgroup label="Enfermedades digestivas">
        <option>Timpanismo agudo</option>
        <option>Diarrea neonatal</option>
        <option>Enteritis</option>
        <option>Acidosis ruminal</option>
        <option>Obstrucción digestiva</option>
      </optgroup>

      <optgroup label="Intoxicaciones y plantas tóxicas">
        <option>Ofidismo (víbora)</option>
        <option>Intoxicación por planta tóxica</option>
        <option>Micotoxicosis (hongos en pasturas)</option>
        <option>Intoxicación mineral (cobre, nitratos)</option>
        <option>Intoxicación química / agroquímico</option>
      </optgroup>

      <optgroup label="Causas físicas / obstétricas">
        <option>Distocía / parto difícil</option>
        <option>Prolapso uterino</option>
        <option>Trauma / accidente</option>
        <option>Ahogamiento</option>
        <option>Golpe de calor</option>
      </optgroup>

      <optgroup label="Depredadores">
        <option>Depredador (jaguar / puma)</option>
        <option>Perros cimarrones</option>
        <option>Ataque de caranchos / buitres</option>
      </optgroup>

      <optgroup label="Otras">
        <option>Causa desconocida</option>
        <option>Otra (especificar)</option>
      </optgroup>
    </select>
  </div>

  <div id="causa-otra-wrap">
    <div class="field">
      <label for="causa-otra">Especificar causa *</label>
      <input type="text" id="causa-otra" placeholder="Describir la causa...">
    </div>
  </div>

  <!-- UBICACION GPS -->
  <div class="section-label">Ubicación</div>

  <div class="field">
    <label>Coordenadas GPS</label>
    <div class="gps-row">
      <input type="text" id="gps-lat" placeholder="Latitud" readonly>
      <input type="text" id="gps-lon" placeholder="Longitud" readonly>
      <button class="btn-gps" id="btn-gps">📍 Capturar</button>
    </div>
    <div id="gps-status" class="status-msg" style="margin-top:6px;"></div>
  </div>

  <div class="field">
    <label for="potrero">Potrero / lote (opcional)</label>
    <input type="text" id="potrero" placeholder="Ej: E3, Lote Sur..." autocomplete="off">
  </div>

  <!-- FOTOS DEL ANIMAL -->
  <div class="section-label">Fotos del animal</div>

  <div class="photo-slots">
    <div class="photo-slot">
      <label>Botón / caravana</label>
      <div class="photo-slot-inner" id="slot-caravana">
        <div class="slot-icon">📷</div>
        <div class="slot-text">Tocar para fotografiar</div>
        <img id="preview-caravana" src="" alt="">
        <button class="remove-photo" id="rm-caravana" type="button">✕</button>
      </div>
      <input class="photo-file-input" type="file" accept="image/*" capture="environment" id="file-caravana">
    </div>
    <div class="photo-slot">
      <label>Animal completo</label>
      <div class="photo-slot-inner" id="slot-animal">
        <div class="slot-icon">📷</div>
        <div class="slot-text">Tocar para fotografiar</div>
        <img id="preview-animal" src="" alt="">
        <button class="remove-photo" id="rm-animal" type="button">✕</button>
      </div>
      <input class="photo-file-input" type="file" accept="image/*" capture="environment" id="file-animal">
    </div>
  </div>

  <!-- OBSERVACIONES -->
  <div class="section-label">Observaciones</div>

  <div class="field">
    <label for="obs">Notas adicionales</label>
    <textarea id="obs" placeholder="Detalles del hallazgo, síntomas observados, potrero exacto..."></textarea>
  </div>

  <div id="form-status" class="status-msg"></div>

</div><!-- /main -->

<div class="submit-bar">
  <button class="btn-submit" id="btn-submit">Registrar mortalidad</button>
</div>

<script>
(function() {
  'use strict';

  // ─── SUPABASE ─────────────────────────────────────────────────────────
  var SUPABASE_URL = 'https://ebvethperccycxpaksrr.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_ppE6aC9Xy7XUoHxfjeG3iw_PpHnLjLW';
  var REST    = SUPABASE_URL + '/rest/v1';
  var STORAGE = SUPABASE_URL + '/storage/v1/object';
  var BUCKET  = 'mortalidade-fotos';

  function supaH(extra) {
    var h = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' };
    if (extra) Object.assign(h, extra);
    return h;
  }

  // ─── IndexedDB queue ──────────────────────────────────────────────────
  var _db = null;
  function openDB() {
    if (_db) return Promise.resolve(_db);
    return new Promise(function(res, rej) {
      var req = indexedDB.open('sigam_mort', 1);
      req.onupgradeneeded = function(e) {
        var s = e.target.result.createObjectStore('queue', { keyPath: 'client_id' });
        s.createIndex('status', 'status', { unique: false });
      };
      req.onsuccess = function(e) { _db = e.target.result; res(_db); };
      req.onerror   = function(e) { rej(e.target.error); };
    });
  }
  function idbPut(r)    { return openDB().then(function(db) { return new Promise(function(res,rej){ var tx=db.transaction('queue','readwrite'); tx.objectStore('queue').put(r); tx.oncomplete=function(){res(r);}; tx.onerror=function(e){rej(e.target.error);}; }); }); }
  function idbDelete(id){ return openDB().then(function(db) { return new Promise(function(res,rej){ var tx=db.transaction('queue','readwrite'); tx.objectStore('queue').delete(id); tx.oncomplete=res; tx.onerror=function(e){rej(e.target.error);}; }); }); }
  function idbAll()     { return openDB().then(function(db) { return new Promise(function(res,rej){ var req=db.transaction('queue','readonly').objectStore('queue').getAll(); req.onsuccess=function(){res(req.result||[]);}; req.onerror=function(e){rej(e.target.error);}; }); }); }

  var _syncing = false;
  var _queue   = [];

  // ─── DATE / TIME ──────────────────────────────────────────────────────
  function pad(n) { return String(n).padStart(2, '0'); }
  var now = new Date();
  document.getElementById('fecha').value = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate());
  document.getElementById('hora').value = pad(now.getHours()) + ':' + pad(now.getMinutes());

  // ─── LOAD ESTABLISHMENTS ──────────────────────────────────────────────
  var _establishmentMap = {}; // name → uuid

  fetch(REST + '/establishments?select=id,name&active=eq.true&order=name', { headers: supaH() })
    .then(function(r) { return r.json(); })
    .then(function(rows) {
      if (!rows || !rows.length) return; // keep static fallback if empty
      var sel = document.getElementById('estab');
      var saved = sel.value;
      sel.innerHTML = '<option value="">Seleccionar...</option>';
      rows.forEach(function(e) {
        _establishmentMap[e.name] = e.id;
        var opt = document.createElement('option');
        opt.value = e.name;
        opt.textContent = e.name;
        sel.appendChild(opt);
      });
      if (saved) sel.value = saved;
    })
    .catch(function() { /* keep static fallback already loaded */ });

  // ─── ID TABS ──────────────────────────────────────────────────────────
  var currentTab = 'manual';
  document.querySelectorAll('.id-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      currentTab = this.getAttribute('data-tab');
      document.querySelectorAll('.id-tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.id-panel').forEach(function(p) { p.classList.remove('active'); });
      this.classList.add('active');
      var panel = document.getElementById('panel-' + currentTab);
      if (panel) panel.classList.add('active');
    });
  });

  // ─── ID PRELOAD desde animales_individuales ───────────────────────────
  var animalCache = [];

  function loadAnimals(estabName) {
    animalCache = [];
    if (!estabName) return;
    var estabId = _establishmentMap[estabName];
    var url;
    if (estabId) {
      url = REST + '/animales_individuales?select=ide,ide_visual,categoria_id,estado,potrero_actual&establishment_id=eq.' + encodeURIComponent(estabId) + '&estado=not.in.(muerto,vendido)&limit=2000';
    } else {
      // fallback: no tenemos el UUID, saltar
      return;
    }
    fetch(url, { headers: supaH() })
      .then(function(r) { return r.json(); })
      .then(function(rows) {
        animalCache = rows.map(function(a) {
          return {
            id_manejo: a.ide_visual || '',
            eid:       a.ide || '',
            categoria: a.categoria_id || '',
            potrero:   a.potrero_actual || '',
            _raw:      a
          };
        });
      })
      .catch(function(err) { console.warn('loadAnimals:', err); });
  }

  document.getElementById('estab').addEventListener('change', function() {
    loadAnimals(this.value);
  });

  // Search / autocomplete
  var numInput    = document.getElementById('num-manejo');
  var clearBtn    = document.getElementById('num-manejo-clear');
  var suggestBox  = document.getElementById('id-suggestions');
  var selectedInfo   = document.getElementById('id-selected-info');
  var selectedAnimal = null;

  numInput.addEventListener('input', function() {
    var q = this.value.trim();
    clearBtn.style.display = q ? 'block' : 'none';
    selectedAnimal = null;
    selectedInfo.style.display = 'none';
    if (!q || animalCache.length === 0) { suggestBox.classList.remove('open'); return; }
    var matches = animalCache.filter(function(a) {
      return String(a.id_manejo).includes(q) || String(a.eid).includes(q);
    }).slice(0, 8);
    if (matches.length === 0) { suggestBox.classList.remove('open'); return; }
    suggestBox.innerHTML = matches.map(function(a) {
      return '<div class="id-suggestion-item" data-id="' + a.id_manejo + '">' +
        '<span class="id-num">' + a.id_manejo + '</span>' +
        '<span class="id-meta">' + (a.categoria || '') + (a.eid ? ' · ' + a.eid : '') + '</span>' +
        '</div>';
    }).join('');
    suggestBox.classList.add('open');
  });

  suggestBox.addEventListener('click', function(e) {
    var item = e.target.closest('.id-suggestion-item');
    if (!item) return;
    var idManejo = item.getAttribute('data-id');
    selectedAnimal = animalCache.find(function(a) { return String(a.id_manejo) === idManejo; });
    numInput.value = idManejo;
    clearBtn.style.display = 'block';
    suggestBox.classList.remove('open');
    if (selectedAnimal) {
      selectedInfo.textContent = '✓ ' + (selectedAnimal.categoria || '') + (selectedAnimal.eid ? ' · EID ' + selectedAnimal.eid : '');
      selectedInfo.style.display = 'block';
      // Auto-fill potrero if available
      if (selectedAnimal.potrero) {
        var potr = document.getElementById('potrero');
        if (potr && !potr.value) potr.value = selectedAnimal.potrero;
      }
    }
  });

  clearBtn.addEventListener('click', function() {
    numInput.value = '';
    clearBtn.style.display = 'none';
    suggestBox.classList.remove('open');
    selectedInfo.style.display = 'none';
    selectedAnimal = null;
  });

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.id-search-wrap')) suggestBox.classList.remove('open');
  });

  // ─── RFID ─────────────────────────────────────────────────────────────
  document.getElementById('btn-rfid-scan').addEventListener('click', function() {
    var st = document.getElementById('rfid-status');
    st.textContent = 'Buscando lector RFID...';
    setTimeout(function() {
      st.textContent = 'Lector no encontrado. Ingrese el EID manualmente.';
    }, 1500);
  });

  // ─── CAUSA ────────────────────────────────────────────────────────────
  document.getElementById('causa').addEventListener('change', function() {
    var wrap = document.getElementById('causa-otra-wrap');
    if (this.value === 'Otra (especificar)') {
      wrap.classList.add('visible');
    } else {
      wrap.classList.remove('visible');
    }
  });

  // ─── GPS ──────────────────────────────────────────────────────────────
  var btnGps   = document.getElementById('btn-gps');
  var gpsStatus = document.getElementById('gps-status');

  btnGps.addEventListener('click', function() {
    if (!navigator.geolocation) {
      showGps('error', 'Geolocalización no disponible en este dispositivo.'); return;
    }
    btnGps.disabled = true;
    btnGps.textContent = '⏳ Capturando...';
    showGps('info', 'Obteniendo ubicación GPS...');
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        document.getElementById('gps-lat').value = pos.coords.latitude.toFixed(6);
        document.getElementById('gps-lon').value = pos.coords.longitude.toFixed(6);
        btnGps.disabled = false;
        btnGps.textContent = '✓ Recapturar';
        showGps('success', 'Ubicación obtenida. Precisión: ±' + Math.round(pos.coords.accuracy) + ' m');
      },
      function(err) {
        btnGps.disabled = false;
        btnGps.textContent = '📍 Capturar';
        var msgs = { 1: 'Permiso denegado. Habilítelo en Configuración.', 2: 'No se pudo obtener posición.', 3: 'Tiempo de espera agotado.' };
        showGps('error', msgs[err.code] || 'Error al obtener ubicación.');
      },
      { enableHighAccuracy: true, timeout: 25000, maximumAge: 0 }
    );
  });

  function showGps(type, msg) {
    gpsStatus.className = 'status-msg ' + type;
    gpsStatus.textContent = msg;
    gpsStatus.style.display = 'block';
  }

  // ─── FOTOS (fix iOS camera) ───────────────────────────────────────────
  var _photos = []; // { blob, name }

  function setupPhotoSlot(slotId, fileId, previewId, rmId) {
    var slot      = document.getElementById(slotId);
    var fileInput = document.getElementById(fileId);
    var preview   = document.getElementById(previewId);
    var rmBtn     = document.getElementById(rmId);
    slot.addEventListener('click', function(e) {
      if (e.target === rmBtn || rmBtn.contains(e.target)) return;
      fileInput.click();
    });
    fileInput.addEventListener('change', function() {
      var file = this.files && this.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(ev) {
        preview.src = ev.target.result;
        slot.classList.add('has-photo');
      };
      reader.readAsDataURL(file);
      _photos.push({ blob: file, name: file.name, slotId: slotId });
    });
    rmBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      preview.src = '';
      fileInput.value = '';
      slot.classList.remove('has-photo');
      _photos = _photos.filter(function(p) { return p.slotId !== slotId; });
    });
  }

  setupPhotoSlot('slot-boton',    'file-boton',    'preview-boton',    'rm-boton');
  setupPhotoSlot('slot-caravana', 'file-caravana', 'preview-caravana', 'rm-caravana');
  setupPhotoSlot('slot-animal',   'file-animal',   'preview-animal',   'rm-animal');

  // ─── SUBMIT ───────────────────────────────────────────────────────────
  var btnSubmit  = document.getElementById('btn-submit');
  var formStatus = document.getElementById('form-status');

  btnSubmit.addEventListener('click', function() {
    formStatus.style.display = 'none';
    formStatus.className = 'status-msg';
    var errors = [];

    if (!document.getElementById('estab').value)   errors.push('Seleccione un establecimiento.');
    if (!document.getElementById('fecha').value)   errors.push('Ingrese la fecha.');

    if (currentTab === 'manual') {
      if (!document.getElementById('num-manejo').value.trim()) errors.push('Ingrese el número de manejo.');
    } else if (currentTab === 'rfid') {
      if (!document.getElementById('caravana-rfid').value.trim()) errors.push('Ingrese o escanee el EID.');
    } else if (currentTab === 'sinid') {
      if (!document.getElementById('sinid-desc').value.trim()) errors.push('Ingrese una descripción del animal.');
    }

    if (!document.getElementById('categoria').value) errors.push('Seleccione la categoría del animal.');

    var causa = document.getElementById('causa').value;
    if (!causa) errors.push('Seleccione la causa de muerte.');
    if (causa === 'Otra (especificar)' && !document.getElementById('causa-otra').value.trim())
      errors.push('Especifique la causa de muerte.');

    if (errors.length > 0) {
      formStatus.className = 'status-msg error';
      formStatus.textContent = errors[0];
      formStatus.style.display = 'block';
      formStatus.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      return;
    }

    // Gather ID value
    var idValue = '';
    if (currentTab === 'manual')  idValue = document.getElementById('num-manejo').value.trim();
    else if (currentTab === 'rfid')  idValue = document.getElementById('caravana-rfid').value.trim();
    else if (currentTab === 'foto')  idValue = document.getElementById('caravana-foto').value.trim() || '(foto)';
    else if (currentTab === 'sinid') idValue = document.getElementById('sinid-desc').value.trim();

    var estabName = document.getElementById('estab').value;
    var estabId   = _establishmentMap[estabName] || null;

    var causaVal   = causa === 'Otra (especificar)' ? document.getElementById('causa-otra').value.trim() : causa;
    var causaDet   = causa === 'Otra (especificar)' ? document.getElementById('causa-otra').value.trim() : null;

    var clientId = 'MORT-' + Date.now() + '-' + Math.random().toString(36).slice(2,7);
    var photos   = _photos.slice(); // snapshot

    var record = {
      client_id:         clientId,
      animal_id_visible: idValue || null,
      id_mode:           currentTab,
      establecimiento:   estabName,
      establishment_id:  estabId,
      fecha:             document.getElementById('fecha').value,
      hora:              document.getElementById('hora').value,
      gps_lat:           parseFloat(document.getElementById('gps-lat').value) || null,
      gps_lon:           parseFloat(document.getElementById('gps-lon').value) || null,
      setor:             document.getElementById('potrero').value.trim() || null,
      causa:             causaVal,
      causa_detalle:     causaDet,
      observaciones:     document.getElementById('obs').value.trim() || null,
      photos_count:      photos.length,
      raw_payload:       { id_mode: currentTab, animal_ref: selectedAnimal || null },
      user_agent:        navigator.userAgent,
      _photos:           photos,
      status:            'pending',
      created_at:        new Date().toISOString()
    };

    btnSubmit.disabled = true;
    btnSubmit.innerHTML = '<span class="spinner"></span>Guardando...';

    idbPut(record).then(function() {
      _queue.unshift(record);
      formStatus.className = 'status-msg success';
      formStatus.textContent = '✓ Registro guardado' + (navigator.onLine ? ' — sincronizando...' : ' (sin conexión, se enviará al reconectarse)');
      formStatus.style.display = 'block';
      formStatus.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      btnSubmit.disabled = false;
      btnSubmit.textContent = 'Registrar mortalidad';
      resetForm();
      if (navigator.onLine) trySyncQueue();
    }).catch(function(err) {
      btnSubmit.disabled = false;
      btnSubmit.textContent = 'Registrar mortalidad';
      formStatus.className = 'status-msg error';
      formStatus.textContent = 'Error al guardar: ' + (err.message || err);
      formStatus.style.display = 'block';
    });
  });

  function resetForm() {
    var savedEstab = document.getElementById('estab').value;
    ['num-manejo','caravana-rfid','caravana-foto','sinid-desc','categoria','sexo','causa','causa-otra','potrero','obs'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.value = '';
    });
    document.getElementById('causa-otra-wrap').classList.remove('visible');
    document.getElementById('gps-lat').value = '';
    document.getElementById('gps-lon').value = '';
    document.getElementById('gps-status').style.display = 'none';
    clearBtn.style.display = 'none';
    selectedInfo.style.display = 'none';
    selectedAnimal = null;
    _photos = [];
    ['caravana','animal','boton'].forEach(function(k) {
      var p = document.getElementById('preview-'+k);
      var s = document.getElementById('slot-'+k);
      var f = document.getElementById('file-'+k);
      if (p) p.src = '';
      if (s) s.classList.remove('has-photo');
      if (f) f.value = '';
    });
    document.getElementById('estab').value = savedEstab;
    var nowR = new Date();
    document.getElementById('fecha').value = nowR.getFullYear() + '-' + pad(nowR.getMonth()+1) + '-' + pad(nowR.getDate());
    document.getElementById('hora').value = pad(nowR.getHours()) + ':' + pad(nowR.getMinutes());
  }

  // ─── SYNC to mortalidades_campo ───────────────────────────────────────
  function trySyncQueue(onlyId) {
    if (!navigator.onLine || _syncing) return;
    idbAll().then(function(rows) {
      var pending = rows.filter(function(r) {
        if (r.status === 'synced') return false;
        if (onlyId) return r.client_id === onlyId;
        return true;
      });
      if (!pending.length) return;
      _syncing = true;

      (async function() {
        for (var i = 0; i < pending.length; i++) {
          var r = pending[i];
          try {
            // 1. Upload photos
            var photoUrls = [];
            var photos = r._photos || [];
            for (var j = 0; j < photos.length; j++) {
              var p = photos[j];
              var ext = (p.name && p.name.split('.').pop().toLowerCase()) || 'jpg';
              if (!['jpg','jpeg','png','webp','heic'].includes(ext)) ext = 'jpg';
              var path = r.client_id + '/' + (j+1) + '.' + ext;
              var up = await fetch(STORAGE + '/' + BUCKET + '/' + path, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'x-upsert': 'true', 'Content-Type': p.blob.type || 'image/jpeg' },
                body: p.blob
              });
              if (!up.ok) throw new Error('foto_' + up.status);
              photoUrls.push(SUPABASE_URL + '/storage/v1/object/public/' + BUCKET + '/' + path);
            }

            // 2. Insert into mortalidades_campo
            var payload = {
              client_id:         r.client_id,
              animal_id_visible: r.animal_id_visible,
              id_mode:           r.id_mode,
              establecimiento:   r.establecimiento,
              establishment_id:  r.establishment_id,
              notificado_por:    r.notificado_por || null,
              fecha:             r.fecha,
              hora:              r.hora || null,
              gps_lat:           r.gps_lat,
              gps_lon:           r.gps_lon,
              gps_accuracy:      r.gps_accuracy || null,
              setor:             r.setor,
              causa:             r.causa,
              causa_detalle:     r.causa_detalle,
              observaciones:     r.observaciones,
              photo_urls:        photoUrls,
              photos_count:      photoUrls.length,
              raw_payload:       r.raw_payload || {},
              user_agent:        r.user_agent,
              estado:            'pendiente'
            };
            var res = await fetch(REST + '/mortalidades_campo', {
              method: 'POST',
              headers: supaH({ 'Prefer': 'return=minimal,resolution=ignore-duplicates' }),
              body: JSON.stringify(payload)
            });
            if (!res.ok && res.status !== 409) {
              var body = await res.text().catch(function(){return '';});
              throw new Error('insert_' + res.status + ' ' + body.slice(0,120));
            }

            r.status = 'synced';
            r._photos = [];
            await idbPut(r);
          } catch(err) {
            console.warn('sync error', r.client_id, err);
            r.status = 'error';
            r.error  = String(err.message || err).slice(0,200);
            await idbPut(r);
          }
        }
        _syncing = false;
        var ok  = pending.filter(function(r){ return r.status === 'synced'; }).length;
        if (ok) console.log(ok + ' registro(s) sincronizado(s) con Supabase');
      })();
    });
  }

  window.addEventListener('online', function() { trySyncQueue(); });

  // ─── Init queue ───────────────────────────────────────────────────────
  idbAll().then(function(rows) {
    _queue = rows;
    if (navigator.onLine) trySyncQueue();
  });

})();
</script>
