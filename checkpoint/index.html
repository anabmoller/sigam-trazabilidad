<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --navy: #0A1628;
    --navy-2: #111f38;
    --burgundy: #7B1E2E;
    --mustard: #F5B301;
    --mustard-dim: #c49000;
    --surface: #f5f4f1;
    --surface-2: #eceae4;
    --border: rgba(10,22,40,0.12);
    --border-strong: rgba(10,22,40,0.22);
    --text: #0A1628;
    --text-2: #4a5568;
    --text-3: #8a95a3;
    --green: #1a6b3c;
    --green-bg: #e6f4ec;
    --red: #8b1c1c;
    --red-bg: #fceaea;
    --amber: #7a4a00;
    --amber-bg: #fef3d0;
    --blue: #0c447c;
    --blue-bg: #e6f1fb;
    --radius: 10px;

  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;

    color: var(--text);
    min-height: 100vh;

  .topbar {
    background: var(--navy);

    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    width: 30px; height: 30px;
    border: 1.5px solid var(--mustard);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 16px; height: 16px; }
  .app-name {
    font-family: 'DM Serif Display', serif;
    color: #fff;
    font-size: 17px;
  }
  .app-name span { color: var(--mustard); }
  .module-badge {

    letter-spacing: 0.1em;
    text-transform: uppercase;

  .conn {

    text-transform: uppercase;

  .conn.online { background: rgba(26,107,60,0.18); color: #7de2a6; border: 1px solid rgba(125,226,166,0.3); }
  .conn.offline { background: rgba(139,28,28,0.22); color: #f0a6a6; border: 1px solid rgba(240,166,166,0.3); }

  .container { max-width: 640px; margin: 0 auto; padding: 1.25rem 1rem 4rem; }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    margin-bottom: .25rem;

<script>
'use strict';

// ---------- config ----------
const SUPABASE_URL = 'https://ebvethperccycxpaksrr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ppE6aC9Xy7XUoHxfjeG3iw_PpHnLjLW';
const REST = SUPABASE_URL + '/rest/v1';

// ---------- state ----------
let state = {
  checkpointId: null,
  checkpointNombre: null,
  operadorNombre: null,
  deviceId: null,
  mode: 'camera',
  scanHistory: [],
  scanning: false,
  lastCode: null,
  lastCodeAt: 0,
};

let html5Qr = null;

// ---------- IndexedDB queue ----------
const DB_NAME = 'sigam-checkpoint-db';
const DB_STORE = 'scanQueue';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(DB_STORE)) {
        db.createObjectStore(DB_STORE, { keyPath: 'localId', autoIncrement: true });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function queueScan(scan) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).add(scan);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function getQueuedScans() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

async function removeQueued(localId) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).delete(localId);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function updateQueueCount() {
  try {
    const all = await getQueuedScans();
    document.getElementById('queueCount').textContent = all.length;
  } catch (e) {
    // no-op
  }
}

async function flushQueue() {
  if (!navigator.onLine) return;
  const all = await getQueuedScans();
  for (const row of all) {
    try {
      const { localId, ...payload } = row;
      const res = await insertScanRemote(payload);
      if (res) await removeQueued(localId);
    } catch (e) {
      // network error — leave queued
      break;
    }
  }
  await updateQueueCount();
}

// ---------- Supabase REST ----------
function supabaseHeaders(extra) {
  return Object.assign({
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
  }, extra || {});
}

async function loadCheckpoints() {
  const url = REST + '/checkpoint_locations?activo=eq.true&select=id,nombre,descripcion&order=nombre.asc';
  const res = await fetch(url, { headers: supabaseHeaders() });
  if (!res.ok) throw new Error('checkpoints_http_' + res.status);
  return await res.json();
}

async function lookupGuia(numero) {
  const url = REST + '/rpc/lookup_guia_for_scan';
  const res = await fetch(url, {
    method: 'POST',
    headers: supabaseHeaders(),
    body: JSON.stringify({ p_numero_guia: numero }),
  });
  if (!res.ok) return null;
  const arr = await res.json();
  if (Array.isArray(arr) && arr.length > 0) return arr[0];
  return null;
}

async function insertScanRemote(scan) {
  const url = REST + '/checkpoint_scans';
  const res = await fetch(url, {
    method: 'POST',
    headers: supabaseHeaders({ 'Prefer': 'return=representation' }),
    body: JSON.stringify(scan),
  });
  if (!res.ok) throw new Error('insert_http_' + res.status);
  const arr = await res.json();
  return Array.isArray(arr) ? arr[0] : arr;
}

// ---------- QR parser ----------
// Expected format (SENACSA):
// 12/01/2026. Cota:00103267000041. Guia:91088907. PO:80050418. EO:0103780002.
// CO:23° 19' 57.99728'' S 56° 42' 35.9967'' OPD:80023325. ED:0101010005.
// CD:23° 27' 15.80246'' S 57° 26' 18.19977'' OF:Faena. A:Tor 42.
function parseSenacsaQR(raw) {
  const text = (raw || '').trim();
  const out = { raw_qr_payload: raw };

  // Leading date
  const dateMatch = text.match(/^(\d{2}\/\d{2}\/\d{4})/);
  if (dateMatch) {
    const [dd, mm, yyyy] = dateMatch[1].split('/');
    out.fecha_guia_qr = `${yyyy}-${mm}-${dd}`;
  }

  const labels = ['Cota', 'Guia', 'PO', 'EO', 'CO', 'OPD', 'ED', 'CD', 'OF', 'A'];
  // Match Label:value up to next label or end
  const pattern = new RegExp(
    '\\b(' + labels.join('|') + ')\\s*:\\s*(.+?)(?=\\s*\\b(?:' + labels.join('|') + ')\\s*:|$)',
    'g'
  );
  let m;
  const fields = {};
  while ((m = pattern.exec(text)) !== null) {
    let val = m[2].trim();
    // strip trailing period
    val = val.replace(/\.\s*$/, '').trim();
    fields[m[1]] = val;
  }

  if (fields.Cota) out.numero_cota = fields.Cota;
  if (fields.Guia) out.numero_guia = fields.Guia;
  if (fields.PO) out.po_ruc = fields.PO;
  if (fields.EO) out.eo_codigo = fields.EO;
  if (fields.CO) out.co_texto = fields.CO;
  if (fields.OPD) out.opd_ruc = fields.OPD;
  if (fields.ED) out.ed_codigo = fields.ED;
  if (fields.CD) out.cd_texto = fields.CD;
  if (fields.OF) out.operacion_final = fields.OF;
  if (fields.A) out.animales_texto = fields.A;

  return out;
}

// ---------- UI helpers ----------
function showBootAlert(msg, kind) {
  const box = document.getElementById('bootAlert');
  if (!msg) { box.innerHTML = ''; return; }
  box.innerHTML = `<div class="alert alert-${kind || 'info'}" style="margin-top:12px">${msg}</div>`;
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (state.scanHistory.length === 0) {
    list.innerHTML = '<div class="empty">Aún no hay escaneos</div>';
    return;
  }
  list.innerHTML = state.scanHistory.slice(0, 20).map(h => {
    const pillClass = h.status === 'matched' ? 'pill-ok'
      : h.status === 'unmatched' ? 'pill-warn'
      : h.status === 'queued' ? 'pill-pending'
      : 'pill-bad';
    const pillTxt = h.status === 'matched' ? 'Coincide'
      : h.status === 'unmatched' ? 'Sin match'
      : h.status === 'queued' ? 'En cola'
      : 'Inválido';
    const time = new Date(h.at).toLocaleTimeString('es-PY', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const sub = h.info || h.note || '';
    return `<div class="hist">
      <div class="hist-main">
        <div class="hist-guia">${h.guia || '—'}</div>
        <div class="hist-sub">${time}${sub ? ' · ' + escapeHtml(sub) : ''}</div>
      </div>
      <span class="pill ${pillClass}">${pillTxt}</span>
    </div>`;
  }).join('');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

function showResult(kind, title, body) {
  document.getElementById('resultArea').innerHTML = `
    <div class="result-card result-${kind}">
      <div class="result-title">${title}</div>
      ${body}
    </div>`;
}

// ---------- Scan flow ----------
async function handleScanPayload(raw, source) {
  // Debounce duplicates within 3s
  const now = Date.now();
  if (raw === state.lastCode && now - state.lastCodeAt < 3000) return;
  state.lastCode = raw;
  state.lastCodeAt = now;

  const parsed = parseSenacsaQR(raw);

  if (!parsed.numero_guia) {
    showResult('bad', 'QR no reconocido', `<div class="result-row">No se encontró el número de guía en el código.</div>`);
    state.scanHistory.unshift({
      guia: '—', status: 'invalid', at: now, note: 'QR no SENACSA'
    });
    renderHistory();
    return;
  }

  showResult('pending', 'Buscando guía…', `<div class="result-guia">${escapeHtml(parsed.numero_guia)}</div>`);

  // Try lookup
  let lookup = null;
  if (navigator.onLine) {
    try {
      lookup = await lookupGuia(parsed.numero_guia);
    } catch (e) { lookup = null; }
  }

  // Build scan record for insert
  const scanRecord = {
    checkpoint_id: state.checkpointId,
    operador_nombre: state.operadorNombre,
    device_id: state.deviceId,
    scanned_at: new Date().toISOString(),
    ...parsed,
  };

  // Insert
  let inserted = null;
  let queued = false;
  if (navigator.onLine) {
    try {
      inserted = await insertScanRemote(scanRecord);
    } catch (e) {
      await queueScan(scanRecord);
      queued = true;
    }
  } else {
    await queueScan(scanRecord);
    queued = true;
  }
  await updateQueueCount();

  // Render result
  const histEntry = {
    guia: parsed.numero_guia,
    at: now,
  };

  if (queued) {
    showResult('pending', 'Guardado en cola (offline)',
      `<div class="result-guia">${escapeHtml(parsed.numero_guia)}</div>
       <div class="result-row">Se enviará cuando vuelva la conexión.</div>`);
    histEntry.status = 'queued';
    histEntry.info = 'Offline';
  } else if (lookup) {
    const animales = lookup.animales_total != null ? lookup.animales_total : '—';
    showResult('ok', 'Guía encontrada',
      `<div class="result-guia">${escapeHtml(parsed.numero_guia)}</div>
       <div class="result-row"><b>EO:</b> ${escapeHtml(lookup.eo_nombre || '—')}</div>
       <div class="result-row"><b>ED:</b> ${escapeHtml(lookup.ed_nombre || '—')}</div>
       <div class="result-row"><b>Operación:</b> ${escapeHtml(lookup.operacion_final || '—')} · <b>Animales:</b> ${animales}</div>`);
    histEntry.status = 'matched';
    histEntry.info = (lookup.eo_nombre || '') + ' → ' + (lookup.ed_nombre || '');
  } else if (inserted && inserted.match_status === 'matched') {
    showResult('ok', 'Guía registrada',
      `<div class="result-guia">${escapeHtml(parsed.numero_guia)}</div>
       <div class="result-row">Coincidencia encontrada en SIGAM.</div>`);
    histEntry.status = 'matched';
  } else {
    showResult('warn', 'Guía no encontrada en SIGAM',
      `<div class="result-guia">${escapeHtml(parsed.numero_guia)}</div>
       <div class="result-row">El escaneo fue registrado igualmente. Revisar en SIGAM.</div>`);
    histEntry.status = 'unmatched';
    histEntry.info = 'Revisar en SIGAM';
  }

  state.scanHistory.unshift(histEntry);
  renderHistory();

  // Beep / vibrate feedback
  if (navigator.vibrate) navigator.vibrate(histEntry.status === 'matched' ? 80 : [60, 40, 60]);
}

function manualSubmit() {
  const input = document.getElementById('manualGuia');
  const val = (input.value || '').trim();
  if (!val) return;
  // synthesize a minimal payload
  const synthetic = `Guia:${val}`;
  handleScanPayload(synthetic, 'manual');
  input.value = '';
}

// ---------- Camera control ----------
async function startCamera() {
  if (html5Qr) return;
  try {
    html5Qr = new Html5Qrcode('reader');
    const config = { fps: 10, qrbox: { width: 260, height: 260 }, aspectRatio: 1.333 };
    await html5Qr.start(
      { facingMode: 'environment' },
      config,
      (decodedText) => handleScanPayload(decodedText, 'camera'),
      () => { /* scan error ignored */ }
    );
  } catch (e) {
    showResult('bad', 'Error de cámara', `<div class="result-row">${escapeHtml(e.message || String(e))}</div>`);
  }
}

async function stopCamera() {
  if (!html5Qr) return;
  try { await html5Qr.stop(); } catch (e) {}
  try { html5Qr.clear(); } catch (e) {}
  html5Qr = null;
}

function setMode(mode) {
  state.mode = mode;
  document.getElementById('modeCameraBtn').classList.toggle('active', mode === 'camera');
  document.getElementById('modeManualBtn').classList.toggle('active', mode === 'manual');
  document.getElementById('cameraMode').classList.toggle('hidden', mode !== 'camera');
  document.getElementById('manualMode').classList.toggle('hidden', mode !== 'manual');
  if (mode === 'camera') {
    startCamera();
  } else {
    stopCamera();
    setTimeout(() => document.getElementById('manualGuia').focus(), 50);
  }
}

// ---------- Session ----------
async function startSession() {
  const cpSel = document.getElementById('checkpointSelect');
  const opInput = document.getElementById('operadorInput');
  const cpId = cpSel.value;
  const opName = (opInput.value || '').trim();
  if (!cpId || !opName) {
    showBootAlert('Elegí un checkpoint y escribí tu nombre.', 'bad');
    return;
  }
  state.checkpointId = cpId;
  state.checkpointNombre = cpSel.options[cpSel.selectedIndex].text;
  state.operadorNombre = opName;

  // persist for reload
  try {
    localStorage.setItem('cp_session', JSON.stringify({
      checkpointId: state.checkpointId,
      checkpointNombre: state.checkpointNombre,
      operadorNombre: state.operadorNombre,
    }));
  } catch (e) {}

  document.getElementById('sessionOp').textContent = opName;
  document.getElementById('sessionCp').textContent = state.checkpointNombre;
  document.getElementById('bootScreen').classList.add('hidden');
  document.getElementById('scanScreen').classList.remove('hidden');

  setMode('camera');
}

async function endSession() {
  await stopCamera();
  state.scanHistory = [];
  state.checkpointId = null;
  state.operadorNombre = null;
  try { localStorage.removeItem('cp_session'); } catch (e) {}
  document.getElementById('scanScreen').classList.add('hidden');
  document.getElementById('bootScreen').classList.remove('hidden');
  document.getElementById('resultArea').innerHTML = '';
  renderHistory();
}

// ---------- Connectivity ----------
function updateConnStatus() {
  const el = document.getElementById('connStatus');
  if (navigator.onLine) {
    el.className = 'conn online';
    el.textContent = 'Online';
  } else {
    el.className = 'conn offline';
    el.textContent = 'Offline';
  }
}

// ---------- Boot ----------
function ensureDeviceId() {
  let id = null;
  try { id = localStorage.getItem('device_id'); } catch (e) {}
  if (!id) {
    id = (crypto.randomUUID && crypto.randomUUID()) ||
         ('dev-' + Math.random().toString(36).slice(2) + '-' + Date.now());
    try { localStorage.setItem('device_id', id); } catch (e) {}
  }
  state.deviceId = id;
}

async function populateCheckpoints() {
  const sel = document.getElementById('checkpointSelect');
  try {
    const list = await loadCheckpoints();
    if (!Array.isArray(list) || list.length === 0) {
      sel.innerHTML = '<option value="">(sin checkpoints activos)</option>';
      showBootAlert('No hay checkpoints activos. Pedí a un admin SIGAM que cree uno.', 'bad');
      return;
    }
    sel.innerHTML = '<option value="">— elegir —</option>' +
      list.map(c => `<option value="${c.id}">${escapeHtml(c.nombre)}</option>`).join('');
  } catch (e) {
    sel.innerHTML = '<option value="">(offline — no se pudo cargar)</option>';
    showBootAlert('Sin conexión para cargar checkpoints. Conectate y recargá.', 'bad');
  }
}

function validateBootForm() {
  const cp = document.getElementById('checkpointSelect').value;
  const op = (document.getElementById('operadorInput').value || '').trim();
  document.getElementById('startSessionBtn').disabled = !(cp && op);
}

window.addEventListener('load', async () => {
  ensureDeviceId();
  updateConnStatus();
  await updateQueueCount();

  document.getElementById('startSessionBtn').addEventListener('click', startSession);
  document.getElementById('checkpointSelect').addEventListener('change', validateBootForm);
  document.getElementById('operadorInput').addEventListener('input', validateBootForm);

  await populateCheckpoints();
  validateBootForm();

  // Restore last session? Only pre-fill operator + checkpoint selection, don't auto-start.
  try {
    const raw = localStorage.getItem('cp_session');
    if (raw) {
      const prev = JSON.parse(raw);
      if (prev && prev.operadorNombre) {
        document.getElementById('operadorInput').value = prev.operadorNombre;
      }
      if (prev && prev.checkpointId) {
        const sel = document.getElementById('checkpointSelect');
        // wait a tick for options to be populated
        setTimeout(() => {
          sel.value = prev.checkpointId;
          validateBootForm();
        }, 100);
      }
    }
  } catch (e) {}

  // SW registration
  if ('serviceWorker' in navigator) {
    try {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    } catch (e) {}
  }

  // Flush on online
  window.addEventListener('online', () => { updateConnStatus(); flushQueue(); });
  window.addEventListener('offline', updateConnStatus);

  // Initial flush attempt
  flushQueue();
});
</script>
